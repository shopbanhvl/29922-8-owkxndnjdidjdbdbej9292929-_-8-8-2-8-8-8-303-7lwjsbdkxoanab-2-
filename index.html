<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTD Premium Gift</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#020202,#001b35);

color:white;

}



.container{

width:420px;

padding:40px;


background:

rgba(255,255,255,0.06);


border-radius:25px;


border:1px solid rgba(0,170,255,.35);


backdrop-filter:blur(18px);


box-shadow:

0 0 50px rgba(0,140,255,.35);


}



.title{

text-align:center;

font-size:38px;

font-weight:900;


letter-spacing:3px;


color:#00aaff;


text-shadow:

0 0 20px #008cff;

}



.line{

height:1px;

background:rgba(255,255,255,.2);

margin:25px 0;

}



.desc{

text-align:center;

color:#aaa;

font-size:14px;

}



label{

display:block;

margin-top:20px;

font-size:13px;

color:#888;

}



input{


width:100%;

margin-top:8px;


padding:15px;


background:#070707;


border:1px solid #1b5275;


border-radius:12px;


color:white;


font-size:16px;


outline:none;


}



input:focus{

border-color:#00aaff;

box-shadow:0 0 15px #008cff;

}



button{


width:100%;


margin-top:30px;


padding:16px;


border:none;


border-radius:15px;


background:

linear-gradient(90deg,#008cff,#00c8ff);


color:white;


font-size:17px;


font-weight:bold;


letter-spacing:1px;


cursor:pointer;


transition:.3s;


}



button:hover{

transform:translateY(-3px);

box-shadow:0 0 30px #008cff;

}



.status{

text-align:center;

margin-top:25px;

color:#00eaff;

}



.footer{


margin-top:25px;


text-align:center;


font-size:12px;


color:#666;


letter-spacing:2px;


}



</style>

</head>


<body>


<div class="container">


<div class="title">

GIFT GEM TTD

</div>


<p class="desc">

PREMIUM GIFT GEM SYSTEM

</p>


<div class="line"></div>



<label>

Receiver

</label>


<input id="username" placeholder="Enter username">



<label>

Amount

</label>


<input id="gem" type="number" placeholder="Enter amount">



<button onclick="sendGift()">

SENT GIFT

</button>



<div class="status" id="status">

...

</div>



<div class="footer">

@banhvlroblox

</div>



</div>



<script>


function sendGift(){


let user=document.getElementById("username").value;

let gem=document.getElementById("gem").value;

let status=document.getElementById("status");



if(!user || !gem){

status.innerHTML="Please fill in all the information.";

return;

}



status.innerHTML="Senting gift...";


setTimeout(()=>{


status.innerHTML=

"Gift sent successfully";


},2000);



}


</script>


</body>
</html>
