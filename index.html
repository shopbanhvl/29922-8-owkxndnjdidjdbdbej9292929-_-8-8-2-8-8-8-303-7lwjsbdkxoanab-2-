<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTD Gift Gem</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle,#004cff,#050505 70%);
color:white;
}


.box{

width:380px;
padding:30px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid #008cff;

box-shadow:0 0 40px #0066ff;

}


.title{

text-align:center;
font-size:35px;
font-weight:900;

color:#00bfff;

text-shadow:0 0 20px #00bfff;

}


p{
text-align:center;
color:#ccc;
margin:10px;
}



input,select{

width:100%;
padding:15px;

margin-top:15px;

border-radius:15px;

border:none;

background:#111;

color:white;

outline:none;

font-size:16px;

}



button{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:15px;


background:linear-gradient(90deg,#00eaff,#0066ff);

color:white;

font-weight:bold;

font-size:18px;

cursor:pointer;

box-shadow:0 0 20px #008cff;

}



button:hover{

transform:scale(1.05);

}



#result{

text-align:center;

margin-top:20px;

color:#00ffcc;

}

.vip{

text-align:center;

margin-top:20px;

color:#ffd700;

}

</style>

</head>


<body>


<div class="box">


<div class="title">
💎 GIFT GEM
</div>


<p>
Toilet Tower Defense Premium Gift
</p>



<input id="user"
placeholder="Nhập tên Roblox người nhận">



<select id="gem">

<option>100 Gems</option>
<option>500 Gems</option>
<option>1000 Gems</option>
<option>5000 Gems VIP</option>

</select>



<button onclick="sendGift()">
🎁 SEND GIFT
</button>



<div id="result">
Waiting...
</div>



<div class="vip">
★ VIP GIFT SYSTEM ★
</div>


</div>



<script>


function sendGift(){

let name=document.getElementById("user").value;

let gem=document.getElementById("gem").value;

let result=document.getElementById("result");


if(name==""){

result.innerHTML="❌ Nhập tên người nhận";

return;

}


result.innerHTML=
"⏳ Đang tạo gift cho "+name+"...";


setTimeout(()=>{


result.innerHTML=
"✅ Đã tạo gift: "+gem+" cho "+name;


},2000);


}


</script>


</body>
</html>
