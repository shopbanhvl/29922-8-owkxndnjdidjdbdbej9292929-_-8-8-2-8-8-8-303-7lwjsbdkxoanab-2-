<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTD Premium Gift</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins", Arial;
}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;


background:

radial-gradient(circle at top,#008cff,#020204 65%);


color:white;

}



.card{


width:420px;

padding:35px;


background:

rgba(255,255,255,0.08);


border:

1px solid rgba(0,170,255,.5);


border-radius:30px;


backdrop-filter:blur(20px);


box-shadow:

0 0 50px #008cff;


}



.logo{


text-align:center;

font-size:42px;

font-weight:900;


color:#00c8ff;


text-shadow:

0 0 25px #00c8ff;


}



.subtitle{

text-align:center;

color:#bbb;

margin-top:8px;

}



.input-box{

margin-top:25px;

}



label{

font-size:14px;

color:#aaa;

}



input{


width:100%;

margin-top:8px;

padding:15px;


border-radius:15px;


border:none;


background:#080808;


color:white;


font-size:17px;


outline:none;


box-shadow:

inset 0 0 10px #0066ff;


}




button{


width:100%;

margin-top:25px;


padding:16px;


border:none;


border-radius:18px;


font-size:18px;


font-weight:bold;


color:white;


background:

linear-gradient(90deg,#00d4ff,#0066ff);


cursor:pointer;


box-shadow:

0 0 25px #008cff;


transition:.3s;


}



button:hover{


transform:scale(1.05);


box-shadow:

0 0 45px #00c8ff;


}



.result{


margin-top:25px;


text-align:center;


color:#00ffcc;


font-weight:bold;


}



.vip{


margin-top:20px;


text-align:center;


font-size:13px;


color:#ffd700;


letter-spacing:2px;


}


.gem-icon{


text-align:center;


font-size:70px;


animation:float 2s infinite;


}



@keyframes float{


50%{

transform:translateY(-10px);

}


}



</style>


</head>


<body>



<div class="card">


<div class="gem-icon">

💎

</div>



<div class="logo">

TTD GIFT

</div>


<div class="subtitle">

Premium Gem Transfer System

</div>



<div class="input-box">


<label>
Receiver Username
</label>


<input id="user" placeholder="Enter Roblox username">


</div>



<div class="input-box">


<label>
Amount of Gems
</label>


<input id="amount" type="number" placeholder="Enter gem amount">


</div>




<button onclick="send()">

🎁 SEND GIFT

</button>



<div class="result" id="result">

Waiting for gift...

</div>



<div class="vip">

★ PREMIUM VIP EXPERIENCE ★

</div>



</div>



<script>


function send(){


let user=document.getElementById("user").value;

let amount=document.getElementById("amount").value;


let result=document.getElementById("result");



if(user=="" || amount==""){

result.innerHTML="❌ Please fill all fields";

return;

}



result.innerHTML=
"⏳ Creating gift package...";


setTimeout(()=>{


result.innerHTML=

"✅ Gift created: "+amount+" Gems → "+user;



},2000);



}



</script>


</body>
</html>
